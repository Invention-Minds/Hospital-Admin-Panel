<div class="alert-row" [attr.data-severity]="alert.severity" (click)="onClick()">
  <div class="alert-icon">
    <i [class]="iconFor()"></i>
  </div>
  <div class="alert-body">
    <div class="alert-title">{{ alert.title }}</div>
    <div class="alert-message">{{ alert.message }}</div>
    <div class="alert-meta">{{ relativeTime() }}</div>
  </div>
  <div class="alert-action" *ngIf="alert.link">
    <i class="pi pi-arrow-right"></i>
  </div>
</div>
