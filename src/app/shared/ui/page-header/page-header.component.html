<header class="page-header" data-testid="page-header">
  <h1 class="page-header__title" data-testid="page-header-title">{{ title }}</h1>

  <p *ngIf="subtitle || patientName || patientPrn || admissionNo || admissionId"
     class="page-header__subtitle"
     data-testid="page-header-subtitle">
    <span *ngIf="subtitle" class="page-header__subtitle-lead">{{ subtitle }}</span>

    <span *ngIf="patientName" class="page-header__patient-name" data-testid="page-header-patient-name">
      {{ patientName }}
    </span>

    <span *ngIf="patientPrn != null" class="page-header__patient-prn" data-testid="page-header-patient-prn">
      PRN {{ patientPrn }}
    </span>

    <!-- Prefer the human-friendly admission number; fall back to the raw id
         only when no number was supplied. -->
    <span *ngIf="admissionNo" class="page-header__admission-id" data-testid="page-header-admission-no">
      Admission {{ admissionNo }}
    </span>
    <span *ngIf="!admissionNo && admissionId" class="page-header__admission-id" data-testid="page-header-admission-id">
      admission {{ admissionId }}
    </span>
  </p>
</header>
